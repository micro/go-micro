name: Architecture Review

# Periodic high-altitude review of the whole framework and harness against the
# North Star (internal/docs/THESIS.md) — part of the autonomous loop
# (internal/docs/CONTINUOUS_IMPROVEMENT.md). Where DevRel watches the public
# story, the architect watches the system: API coherence, lifecycle gaps, and
# whether recent increments are converging on the thesis or sprawling.
#
# The architect's OUTPUT is an assessment plus scoped follow-up issues that feed
# the hourly increment loop — NOT large refactors. Breaking public-API and
# architectural changes stay with the human (see CONTINUOUS_IMPROVEMENT.md).
#
# Opens a fresh issue and dispatches Codex via CODEX_TRIGGER_TOKEN.

on:
  workflow_dispatch: {}
  schedule:
    - cron: "0 8 */3 * *" # roughly every 3 days, 08:00 UTC (tunable)

permissions:
  issues: write

concurrency:
  group: architecture-review
  cancel-in-progress: false

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Open an architecture review issue and dispatch Codex
        env:
          GH_TOKEN: ${{ secrets.CODEX_TRIGGER_TOKEN || github.token }}
          HAS_TRIGGER_TOKEN: ${{ secrets.CODEX_TRIGGER_TOKEN != '' }}
          REPO: ${{ github.repository }}
          RUN_NUMBER: ${{ github.run_number }}
        run: |
          if [ "$HAS_TRIGGER_TOKEN" != "true" ]; then
            echo "CODEX_TRIGGER_TOKEN is not set — skipping (Codex ignores Actions-bot comments)."
            exit 0
          fi
          ISSUE_URL=$(gh issue create --repo "$REPO" \
            --title "Architecture review #$RUN_NUMBER" \
            --body "Periodic architecture / harness review against the North Star in internal/docs/THESIS.md. Output: an assessment plus scoped follow-up issues for the increment loop.")
          ISSUE_NUM="${ISSUE_URL##*/}"
          echo "Opened issue #$ISSUE_NUM — dispatching Codex (Architect)."
          gh issue comment "$ISSUE_NUM" --repo "$REPO" --body \
          "@codex Act as the architect for go-micro. Your PRIMARY job is to maintain the ranked work queue in internal/docs/PRIORITIES.md by prioritizing the roadmap (ROADMAP.md, Now → Next → Later) together with an internal scan: gaps or missing pieces in the services → agents → workflows lifecycle, API coherence across the core packages (agent, ai, flow, gateway/mcp, gateway/a2a, model, server, store, registry), duplication/drift, tech debt, and test/DX friction. Each run: (1) review what shipped recently (scan recently merged PRs) and re-rank; (2) make sure every top priority has a scoped, CI-verifiable tracking issue — for gaps not yet tracked, file one with \`gh issue create --label codex --label enhancement --title \"<scoped task>\" --body \"<goal, scope, acceptance criteria>\"\`; (3) rewrite internal/docs/PRIORITIES.md as a SINGLE ordered list, highest-value first, each item linking its issue (#N), with roadmap phase as the primary ordering and internal findings interleaved by value. Open ONE PR for the PRIORITIES.md update: \`git switch -c codex/architect-$ISSUE_NUM\`, \`git push -u origin codex/architect-$ISSUE_NUM\`, \`gh pr create --base master --label codex --title \"<title>\" --body \"<summary, Closes #$ISSUE_NUM>\"\`, then \`gh pr merge --squash --auto --delete-branch\`. Also post a concise architectural assessment as a comment on this issue (#$ISSUE_NUM): strengths, top risks/gaps, and the reasoning behind the new ranking. Do NOT make breaking public-API or architectural changes yourself — propose those in the assessment as notes for the human, never as auto-merged queue items. Do not use the make_pr tool (it is a no-op stub)."
